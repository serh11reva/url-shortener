# Continuous integration: build, unit tests, Vue client, integration tests (Testcontainers), Docker image builds.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/Shortener.Client.Web/package-lock.json

      - name: Restore and build solution
        run: |
          dotnet restore Shortener.slnx
          dotnet build Shortener.slnx -c Release --no-restore

      - name: Unit tests
        run: |
          set -e
          dotnet test tests/Shortener.Domain.Tests/Shortener.Domain.Tests.csproj -c Release --no-build --verbosity normal
          dotnet test tests/Shortener.Application.Tests/Shortener.Application.Tests.csproj -c Release --no-build --verbosity normal
          dotnet test tests/Shortener.Infrastructure.Database.Tests/Shortener.Infrastructure.Database.Tests.csproj -c Release --no-build --verbosity normal

      - name: Vue lint and build
        working-directory: src/Shortener.Client.Web
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Integration tests
        run: |
          dotnet test tests/Shortener.IntegrationTests/Shortener.IntegrationTests.csproj -c Release --no-build --verbosity normal

      - name: Verify API Docker image
        run: docker build -f src/Shortener.Host.Api/Dockerfile -t shortener-api:ci .

      - name: Verify frontend Docker image
        run: docker build -f src/Shortener.Client.Web/Dockerfile -t shortener-web:ci src/Shortener.Client.Web
