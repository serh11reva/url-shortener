services:
  api:
    build:
      context: .
      dockerfile: src/Shortener.Host.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__cache: redis:6379
      ConnectionStrings__cosmos: AccountEndpoint=https://cosmos:8081/;AccountKey=C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==
      ConnectionStrings__messaging: Endpoint=sb://servicebus-emulator;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=emulator;UseDevelopmentEmulator=true
      Shortener__BaseUrl: http://localhost:3000
    depends_on:
      redis:
        condition: service_healthy
      cosmos:
        condition: service_started
      servicebus-emulator:
        condition: service_started
    networks:
      - shortener-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/alive"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: src/Shortener.Client.Web
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - shortener-net

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - shortener-net

  cosmos:
    image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview
    ports:
      - "8081:8081"
      - "1234:1234"
    command: ["--protocol", "https"]
    networks:
      - shortener-net

  servicebus-emulator:
    image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
    ports:
      - "5672:5672"
      - "5300:5300"
    volumes:
      - ./docker/sb-emulator-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json
    environment:
      SQL_SERVER: servicebus-sqledge
      MSSQL_SA_PASSWORD: "ShortenerDevP@ss1!"
      ACCEPT_EULA: Y
    depends_on:
      - servicebus-sqledge
    networks:
      - shortener-net

  servicebus-sqledge:
    image: mcr.microsoft.com/azure-sql-edge:latest
    environment:
      ACCEPT_EULA: Y
      MSSQL_SA_PASSWORD: "ShortenerDevP@ss1!"
    networks:
      - shortener-net

networks:
  shortener-net:
    driver: bridge
